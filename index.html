<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>My Library</h1>

        <!--Button to show the form-->
        <button id="addBookBtn" class="addBtn">Add New Book</button>

        <!--Hidden Form- only shows when biutton is clicked -->
        <div id="bookForm" style="display: none;">
            <input type="text" id="title" placeholder="Title">
            <input type="text" id="author" placeholder="Author">
            <input type="number" id="pages" placeholder="Number of Pages">
            <label>
                <input type="checkbox" id="hasBeenRead">Have you read the book?
            </label>
            <button id="submitBook">Add Book</button>
        </div>

        <!--Library Grid - Javascript fills it-->
        <div id="library"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
